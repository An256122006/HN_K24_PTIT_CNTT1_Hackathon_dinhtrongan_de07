<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">


    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f7fa;
        }

        .container {
            margin-top: 30px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header form {
            display: flex;
            gap: 10px;
        }

        .header input {
            width: 300px;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 8px 12px;
            transition: 0.3s;
        }

        .header input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        /* Table */
        .table {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background-color: #007bff;
            color: white;
        }

        .table th, .table td {
            vertical-align: middle;
            text-align: center;
        }

        /* Image */
        .table img {
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        /* Buttons */
        .btn {
            border-radius: 6px;
            padding: 5px 10px;
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
        }

        .btn-danger {
            background-color: #dc3545;
            border: none;
        }


        .table tbody tr:hover {
            background-color: #f1f1f1;
        }

    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <form th:action="@{/artwork/list}" method="get">
                <input type="text" placeholder="Tìm kiếm" name="keyword" th:value="${keyword}">
                <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            </form>
        </div>
        <div>
            <a th:href="@{/artwork/add}" class="btn btn-primary">Thêm</a>
        </div>

    </div>
    <table class="table">
        <thead>
        <tr>
            <th>STT</th>
            <th>Title</th>
            <th>Artist</th>
            <th>Year</th>
            <th>Art Image</th>
            <th colspan="2">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="artWork : ${artWorkList}">
            <td th:text="${artWork.id}"></td>
            <td th:text="${artWork.title}"></td>
            <td th:text="${artWork.artist}"></td>
            <td th:text="${artWork.year}"></td>
            <td><img th:src="@{'/images/' + ${artWork.artImage}}" alt="Art Image" width="100" height="100"></td>
            <td>
                <a class="btn btn-primary" th:href="@{/artwork/update/{id}(id=${artWork.id})}" role="button">Sửa</a>
                <a class="btn btn-primary" th:href="@{/artwork/delete/{id}(id=${artWork.id})}" role="button">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
