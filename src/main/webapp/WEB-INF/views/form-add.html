<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Artwork</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body { background: #f4f6f9; }
        .container {
            width: 450px;
            margin: 60px auto;
            padding: 25px 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .container h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px;
        }
        input[type="file"] {
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            background: #fafafa;
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Add Artwork</h2>

    <form th:action="@{/artwork/add}" method="post"
          enctype="multipart/form-data" th:object="${artWork}">

        <div class="form-group">
            <label>Title</label>
            <input type="text" class="form-control" th:field="*{title}">
            <span th:errors="*{title}" class="text-danger small"></span>
        </div>

        <div class="form-group">
            <label>Artist</label>
            <input type="text" class="form-control" th:field="*{artist}">
            <span th:errors="*{artist}" class="text-danger small"></span>
        </div>

        <div class="form-group">
            <label>Year</label>
            <input type="number" class="form-control" th:field="*{year}">
            <span th:errors="*{year}" class="text-danger small"></span>
        </div>

        <div class="form-group">
            <label>Art Image</label>

            <input type="hidden" th:field="*{artImage}"/>

            <input type="file" name="file" accept=".png,.jpg">
            <span th:errors="*{artImage}" class="text-danger small"></span>
        </div>

        <button type="submit" class="btn btn-primary">Add Artwork</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
